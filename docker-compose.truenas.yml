# TrueNAS SCALE (Electric Eel 24.10+) — forrásból buildelő összeállítás.
# Használat: klónozd a repót a poolra, töltsd ki a .env-et, majd:
#   docker compose -f docker-compose.truenas.yml up -d --build
#
# Az adatok a repó melletti ./data mappákba kerülnek (a poolon vannak),
# így nincs szükség külön /mnt/<pool>/... útvonalak szerkesztésére.
services:
  postgres:
    image: postgres:16-alpine
    container_name: media-chatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-media_bot}
      POSTGRES_USER: ${POSTGRES_USER:-media_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - media-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-media_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: media-chatbot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - media-net

  ollama:
    image: ollama/ollama:latest
    container_name: media-chatbot-ollama
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - media-net
    # GPU (NVidia) esetén szedd ki a kommentből:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build:
      context: ./backend
    container_name: media-chatbot-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-media_bot}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-media_bot}
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      # cache / media / downloads (a settings abszolút /data útvonalai)
      - ./data/app:/data
      # tanítófájlok, automatikus mentések (a WORKDIR-relatív /app/data) — perzisztens
      - ./data/backend:/app/data
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - media-net

  frontend:
    build:
      context: ./frontend
    container_name: media-chatbot-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - media-net

networks:
  media-net:
    driver: bridge
